<svg width="120" height="40" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="20" cy="20" r="18" fill="url(#logoGradient)" stroke="#2c3e50" stroke-width="1"/>
  
  <!-- Tech icon - circuit pattern -->
  <g fill="white" stroke="white" stroke-width="0.5">
    <!-- Central processor -->
    <rect x="15" y="15" width="10" height="10" rx="1" fill="white"/>
    <!-- Circuit lines -->
    <line x1="10" y1="15" x2="15" y2="15" stroke-width="1"/>
    <line x1="10" y1="20" x2="15" y2="20" stroke-width="1"/>
    <line x1="10" y1="25" x2="15" y2="25" stroke-width="1"/>
    <line x1="25" y1="15" x2="30" y2="15" stroke-width="1"/>
    <line x1="25" y1="20" x2="30" y2="20" stroke-width="1"/>
    <line x1="25" y1="25" x2="30" y2="25" stroke-width="1"/>
    <!-- Connection dots -->
    <circle cx="10" cy="15" r="1" fill="white"/>
    <circle cx="10" cy="20" r="1" fill="white"/>
    <circle cx="10" cy="25" r="1" fill="white"/>
    <circle cx="30" cy="15" r="1" fill="white"/>
    <circle cx="30" cy="20" r="1" fill="white"/>
    <circle cx="30" cy="25" r="1" fill="white"/>
  </g>
  
  <!-- Company name -->
  <text x="45" y="16" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">TechCorp</text>
  <text x="45" y="28" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">SOLUTIONS</text>
</svg>